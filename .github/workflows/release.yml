name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build DMG
        run: ./make-dmg.sh
      - name: Create GitHub release with DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.dmg \
            --title "ProjectOpener $GITHUB_REF_NAME" \
            --generate-notes
